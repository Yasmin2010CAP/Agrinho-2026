            transition: background-color 0.2s;

        .btn-interativo:hover {
            background-color: #1b4d3e;
        }

        .container {

        .rodape {

            text-align: center;
            padding: 30px 10px;

        }

        .rodape p {
            margin: 0;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .topo h1 { font-size: 24px; }
            .menu a { display: block; margin: 10px 0; }
            .texto-principal { font-size: 16px; }
        }
    </style>
